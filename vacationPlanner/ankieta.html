<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankieta | Vacation Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        </header>

    <main>
        <section class="survey-section">
            <h1>opisAnkiety</h1>
            <p>podpisOpisuStrony</p>

            <form id="vacation-survey">
                <p>Wybierz interesujące Cię kierunki:</p>
                <div class="slider-container">
                <div class="slider-track" id="destination-slider">
            
            <label class="destination-card">
                <input type="checkbox" name="destinations" value="gory" hidden>
                <div class="card-content">
                    <img src="mountains.jpg" alt="Góry">
                    <span>Góry</span>
                </div>
            </label>

            <label class="destination-card">
                <input type="checkbox" name="destinations" value="morze" hidden>
                <div class="card-content">
                    <img src="sea.jpg" alt="Morze">
                    <span>Morze</span>
                </div>
            </label>

            <label class="destination-card">
                <input type="checkbox" name="destinations" value="miasto" hidden>
                <div class="card-content">
                    <img src="city.jpg" alt="City Break">
                    <span>City Break</span>
                </div>
            </label>

            </div>
    </div

                <div class="form-group">
                    <label>
                    <input type="radio" name="budget" value="low" required>Do 2000 PLN</label>
                    <label>
                        <input type="radio" name="budget" value="medium">
                        2000 - 5000 PLN
                    </label>
                    <label>
                        <input type="radio" name="budget" value="high">
                        Powyżej 5000 PLN
                    </label>
                </div>

                <button type="submit">Zapisz odpowiedzi</button>
            </form>
        </section>
    </main>

    <script src="functionality.js"></script>
</body>
</html>
